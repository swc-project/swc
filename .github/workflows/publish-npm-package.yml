name: "Build npm package"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ inputs.package }}
  cancel-in-progress: true

env:
  DEBUG: napi:*
  APP_NAME: swc
  MACOSX_DEPLOYMENT_TARGET: "10.13"
  CARGO_INCREMENTAL: 0
  CARGO_PROFILE_RELEASE_LTO: "fat"
  CI: "1"
  COREPACK_VERSION: "0.33.0"
  DISABLE_PLUGIN_E2E_TESTS: true
  GIT_AUTHOR_NAME: "SWC Bot"
  GIT_AUTHOR_EMAIL: "bot@swc.rs"
  GIT_COMMITTER_NAME: "SWC Bot"
  GIT_COMMITTER_EMAIL: "bot@swc.rs"

permissions: {}

on:
  workflow_call:
    inputs:
      buildType:
        type: string
        required: true
      package:
        type: string
        required: true
      version:
        type: string
        required: true
      buildCli:
        type: boolean
        required: true
      skipBuild:
        type: boolean
        required: true
      publishWasm:
        type: boolean
        required: true
      skipPublishing:
        type: boolean
        required: true

jobs:
  check-if-build-required:
    name: Check if build is required
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # Run only on main branch
    if: github.ref == 'refs/heads/main'
    outputs:
      need-build: ${{ steps.check.outputs.need-build }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false
      # TODO: Check for existing artifacts
      - id: check
        if: ${{ !inputs.skipBuild }}
        env:
          PACKAGE: ${{ inputs.package }}
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          case "$PACKAGE" in
            core | html | minifier | react-compiler) ;;
            *)
              echo "Unsupported package: $PACKAGE" >&2
              exit 1
              ;;
          esac

          case "$RELEASE_VERSION" in
            *[!A-Za-z0-9._-]* | "")
              echo "Unsupported version: $RELEASE_VERSION" >&2
              exit 1
              ;;
          esac

          echo "need-build=true" >> "$GITHUB_OUTPUT"

  build:
    if: needs.check-if-build-required.outputs.need-build == 'true'
    needs:
      - check-if-build-required
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: macos-latest
            target: x86_64-apple-darwin
            build: |
              if [[ ${{ inputs.package }} == "core" ]]; then
                cargo build --manifest-path ../../bindings/swc_cli/Cargo.toml --release --features plugin --target x86_64-apple-darwin
                cp ../../target/x86_64-apple-darwin/release/swc .
                chmod +x ./swc
              fi
              pnpm build --target x86_64-apple-darwin
              strip -x *.node
          - host: windows-latest
            build: |
              export CARGO_PROFILE_RELEASE_LTO=false
              pnpm build --target x86_64-pc-windows-msvc
              if [[ ${{ inputs.package }} == "core" ]]; then
                cargo build --manifest-path ../../bindings/swc_cli/Cargo.toml --release --features plugin --target x86_64-pc-windows-msvc
                cp ../../target/x86_64-pc-windows-msvc/release/swc .
              fi
            target: x86_64-pc-windows-msvc
          - host: windows-latest
            # Use x64 Node.js for installation because ia32 Node.js cannot allocate enough memory.
            build: |
              export DISABLE_PLUGIN_E2E_TESTS=true
              export CARGO_PROFILE_RELEASE_LTO=false
              if [[ ${{ inputs.package }} == "core" ]]; then
                cargo build --manifest-path ../../bindings/swc_cli/Cargo.toml --release --target i686-pc-windows-msvc
                cp ../../target/i686-pc-windows-msvc/release/swc .
                pnpm build --target i686-pc-windows-msvc --no-default-features --features swc_v1
              else
                pnpm build --target i686-pc-windows-msvc
              fi
            target: i686-pc-windows-msvc
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            docker: ghcr.io/napi-rs/napi-rs/nodejs-rust:lts-debian@sha256:6f910fc8a723a1eeab2483d2302e8c1fabe36e54c51eb0da27fafd5c3083e08c
            build: >-
              set -e &&
              unset CC_x86_64_unknown_linux_gnu && unset CC && RUSTFLAGS='-C target-feature=+sse2' cargo build --manifest-path ../../bindings/swc_cli/Cargo.toml --release --features plugin --target x86_64-unknown-linux-gnu &&
              rm -rf ../../target/target/x86_64-unknown-linux-gnu/release/.cargo-lock &&
              cp ../../target/x86_64-unknown-linux-gnu/release/swc . && chmod +x ./swc &&
              if [[ ${{ inputs.package }} == "core" ]]; then
                pnpm build --target x86_64-unknown-linux-gnu --no-default-features --features swc_v1,plugin
              else
                pnpm build --target x86_64-unknown-linux-gnu
              fi
          - host: ubuntu-latest
            target: x86_64-unknown-linux-musl
            # musl build is slow, let's disable the LTO
            docker: ghcr.io/napi-rs/napi-rs/nodejs-rust:lts-alpine@sha256:caac2d1b9194eada0c69e669e72763869701351d8957ab805cc45a43999d8be2
            build: >-
              set -e &&
              rm /etc/apk/repositories &&
              echo "https://dl-cdn.alpinelinux.org/alpine/v3.21/main" >> /etc/apk/repositories &&
              echo "https://dl-cdn.alpinelinux.org/alpine/v3.21/community" >> /etc/apk/repositories &&
              apk update &&
              apk add --upgrade clang-static llvm-dev &&
              export CARGO_PROFILE_RELEASE_LTO=false &&
              if [[ ${{ inputs.package }} == "core" ]]; then
                RUSTFLAGS='-C target-feature=+sse2' cargo build --manifest-path ../../bindings/swc_cli/Cargo.toml --release --features plugin --target x86_64-unknown-linux-musl &&
                rm -rf target/release/.cargo-lock &&
                cp ../../target/x86_64-unknown-linux-musl/release/swc . && chmod +x ./swc &&
                RUSTFLAGS='-C target-feature=+sse2 -C target-feature=-crt-static' pnpm build --target x86_64-unknown-linux-musl
              else
                RUSTFLAGS='-C target-feature=+sse2 -C target-feature=-crt-static' pnpm build --target x86_64-unknown-linux-musl
              fi
          - host: macos-latest
            target: aarch64-apple-darwin
            build: |
              sudo rm -Rf /Library/Developer/CommandLineTools/SDKs/*;
              export CC=$(xcrun -f clang);
              export CXX=$(xcrun -f clang++);
              SYSROOT=$(xcrun --sdk macosx --show-sdk-path);
              export CFLAGS="-isysroot $SYSROOT -isystem $SYSROOT";
              if [[ ${{ inputs.package }} == "core" ]]; then
                cargo build --manifest-path ../../bindings/swc_cli/Cargo.toml --release --features plugin --target aarch64-apple-darwin
                cp ../../target/aarch64-apple-darwin/release/swc .
                chmod +x ./swc
              fi
              pnpm build --target aarch64-apple-darwin
          - host: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            docker: ghcr.io/napi-rs/napi-rs/nodejs-rust:lts-debian-aarch64@sha256:54509bac10132e6a4148fd5ef59c0057c37bb332221fb7448d907bd575936114
            build: >-
              set -e &&
              export JEMALLOC_SYS_WITH_LG_PAGE=16 &&
              rustup target add aarch64-unknown-linux-gnu &&
              if [[ ${{ inputs.package }} == "core" ]]; then
                RUSTFLAGS='' cargo build --manifest-path ../../bindings/swc_cli/Cargo.toml --release --features plugin --target aarch64-unknown-linux-gnu &&
                cp ../../target/aarch64-unknown-linux-gnu/release/swc . && chmod +x ./swc &&
                export CC_aarch64_unknown_linux_gnu=clang &&
                pnpm build --target aarch64-unknown-linux-gnu
              else
                export CC_aarch64_unknown_linux_gnu=clang &&
                pnpm build --target aarch64-unknown-linux-gnu
              fi
          - host: ubuntu-latest
            target: armv7-unknown-linux-gnueabihf
            build: |
              export DISABLE_PLUGIN_E2E_TESTS=true
              if [[ ${{ inputs.package }} == "core" ]]; then
                pnpm exec napi build --bin swc --release --target armv7-unknown-linux-gnueabihf --manifest-path ../../bindings/swc_cli/Cargo.toml -x --target-dir ../release -o .
                chmod +x ./swc
                pnpm build --target armv7-unknown-linux-gnueabihf --no-default-features --features swc_v1 --use-napi-cross
              else
                pnpm build --target armv7-unknown-linux-gnueabihf --use-napi-cross
              fi
          - host: ubuntu-latest
            target: powerpc64le-unknown-linux-gnu
            build: |
              export DISABLE_PLUGIN_E2E_TESTS=true
              if [[ ${{ inputs.package }} == "core" ]]; then
                pnpm exec napi build --bin swc --release --target powerpc64le-unknown-linux-gnu --manifest-path ../../bindings/swc_cli/Cargo.toml -x --target-dir ../release -o .
                chmod +x ./swc
                pnpm build --target powerpc64le-unknown-linux-gnu --no-default-features --features swc_v1 --use-napi-cross
              else
                pnpm build --target powerpc64le-unknown-linux-gnu --use-napi-cross
              fi
          - host: ubuntu-latest
            target: s390x-unknown-linux-gnu
            build: |
              export DISABLE_PLUGIN_E2E_TESTS=true
              if [[ ${{ inputs.package }} == "core" ]]; then
                pnpm exec napi build --bin swc --release --target s390x-unknown-linux-gnu --manifest-path ../../bindings/swc_cli/Cargo.toml -x --target-dir ../release -o .
                chmod +x ./swc
                pnpm build --target s390x-unknown-linux-gnu --no-default-features --features swc_v1 --use-napi-cross
              else
                pnpm build --target s390x-unknown-linux-gnu --use-napi-cross
              fi
          - host: ubuntu-latest
            target: aarch64-unknown-linux-musl
            downloadTarget: aarch64-unknown-linux-musl
            docker: ghcr.io/napi-rs/napi-rs/nodejs-rust:lts-alpine@sha256:caac2d1b9194eada0c69e669e72763869701351d8957ab805cc45a43999d8be2
            build: >-
              rm /etc/apk/repositories &&
              echo "https://dl-cdn.alpinelinux.org/alpine/v3.21/main" >> /etc/apk/repositories &&
              echo "https://dl-cdn.alpinelinux.org/alpine/v3.21/community" >> /etc/apk/repositories &&
              apk update &&
              apk add --upgrade clang-static llvm-dev &&
              export JEMALLOC_SYS_WITH_LG_PAGE=16 &&
              rustup toolchain install $(cat ../../rust-toolchain) &&
              rustup target add aarch64-unknown-linux-musl &&
              if [[ ${{ inputs.package }} == "core" ]]; then
                RUSTFLAGS='-C target-feature=+crt-static -C link-arg=-lgcc' cargo build --manifest-path ../../bindings/swc_cli/Cargo.toml --release --features plugin --target aarch64-unknown-linux-musl &&
                rm -rf target/release/.cargo-lock &&
                cp ../../target/aarch64-unknown-linux-musl/release/swc . && chmod +x ./swc &&
                env RUSTFLAGS='-C target-feature=-crt-static' pnpm build --target=aarch64-unknown-linux-musl
              else
                env RUSTFLAGS='-C target-feature=-crt-static' pnpm build --target=aarch64-unknown-linux-musl
              fi
          - host: windows-latest
            target: aarch64-pc-windows-msvc
            # Disable `LTO` and increase `codegen-units` to avoid llvm `OOM` on GitHub Actions.
            build: |
              export DISABLE_PLUGIN_E2E_TESTS=true
              export CARGO_PROFILE_RELEASE_CODEGEN_UNITS=256
              export CARGO_PROFILE_RELEASE_LTO=false
              if [[ ${{ inputs.package }} == "core" ]]; then
                cargo build --manifest-path ../../bindings/swc_cli/Cargo.toml --release --target aarch64-pc-windows-msvc
                cp ../../target/aarch64-pc-windows-msvc/release/swc.exe .
                pnpm build --target aarch64-pc-windows-msvc --no-default-features --features swc_v1
              else
                pnpm build --target aarch64-pc-windows-msvc
              fi
    name: "Build ${{ inputs.package }} - ${{ matrix.settings.target }} - node@20"
    runs-on: ${{ matrix.settings.host }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false
          ref: "v${{ inputs.version }}"

      - name: Corepack
        shell: bash
        run: corepack enable
      - name: Setup node x64
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: 20
          architecture: x64
      - name: Output toolchain
        id: toolchain
        shell: bash
        run: echo "version=$(cat ./rust-toolchain)" >> "$GITHUB_OUTPUT"
      - name: Install
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        if: ${{ !matrix.settings.docker }}
        with:
          targets: ${{ matrix.settings.target }}
          toolchain: ${{ steps.toolchain.outputs.version }}
      # `pnpm exec napi build ... -x` invokes `cargo-zigbuild`, which requires zig on the runner.
      - uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        if: ${{ matrix.settings.target == 'armv7-unknown-linux-gnueabihf' || matrix.settings.target == 'powerpc64le-unknown-linux-gnu' || matrix.settings.target == 's390x-unknown-linux-gnu' }}
        with:
          version: 0.15.1
      - name: Install dependencies
        shell: bash
        env:
          TARGET: ${{ matrix.settings.target }}
        run: |
          corepack enable
          if [[ "$TARGET" == "i686-pc-windows-msvc" ]]; then
            pnpm install --frozen-lockfile --cpu=ia32
          else
            pnpm install --frozen-lockfile
          fi
          curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
          echo '/usr/local/cargo/bin' >> $GITHUB_PATH
      - name: Setup node x86
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        if: matrix.settings.target == 'i686-pc-windows-msvc'
        with:
          node-version: 20
          architecture: x86
      - name: Build in docker
        if: ${{ matrix.settings.docker }}
        shell: bash
        env:
          BUILD_SCRIPT: ${{ matrix.settings.build }}
          DOCKER_IMAGE: ${{ matrix.settings.docker }}
          PACKAGE: ${{ inputs.package }}
          WORKSPACE: ${{ github.workspace }}
        run: |
          set -euo pipefail
          case "$PACKAGE" in
            core | html | minifier | react-compiler) ;;
            *)
              echo "Unsupported package: $PACKAGE" >&2
              exit 1
              ;;
          esac

          PACKAGE_MANAGER="$(node -p "require('./package.json').packageManager")"
          case "$PACKAGE_MANAGER" in
            pnpm@*) ;;
            *)
              echo "Unsupported packageManager: $PACKAGE_MANAGER" >&2
              exit 1
              ;;
          esac

          mkdir -p "$HOME/.cargo/git" "$HOME/.cargo/registry"
          docker run --rm \
            -e BUILD_SCRIPT \
            -e COREPACK_VERSION \
            -e PACKAGE \
            -e PACKAGE_MANAGER \
            -v "$HOME/.cargo/git:/root/.cargo/git" \
            -v "$HOME/.cargo/registry:/root/.cargo/registry" \
            -v "$WORKSPACE:/build" \
            -w /build \
            "$DOCKER_IMAGE" \
            bash -lc 'set -euo pipefail; cd "/build/packages/${PACKAGE}"; npm install -g "corepack@${COREPACK_VERSION}"; corepack enable; corepack prepare "${PACKAGE_MANAGER}" --activate; npm i -g wasm-pack; bash -lc "$BUILD_SCRIPT"'
      - name: Build
        if: ${{ !matrix.settings.docker }}
        shell: bash
        env:
          BUILD_SCRIPT: ${{ matrix.settings.build }}
          PACKAGE: ${{ inputs.package }}
        run: |
          set -euo pipefail
          case "$PACKAGE" in
            core | html | minifier | react-compiler) ;;
            *)
              echo "Unsupported package: $PACKAGE" >&2
              exit 1
              ;;
          esac

          cd "packages/$PACKAGE"
          bash -lc "$BUILD_SCRIPT"
      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: bindings-${{ inputs.buildType }}-${{ inputs.package }}-${{ inputs.version}}-${{ matrix.settings.target }}
          path: |
            packages/${{ inputs.package }}/swc*
            packages/${{ inputs.package }}/*.node
          if-no-files-found: error
  test-macOS-windows-binding:
    name: Test bindings on ${{ matrix.settings.target }} - node@${{ matrix.node }}
    needs:
      - build
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: windows-latest
            target: x86_64-pc-windows-msvc
          - host: macos-latest
            target: x86_64-apple-darwin
        node:
          - "20"
          - "22"
    runs-on: ${{ matrix.settings.host }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false
          ref: "v${{ inputs.version }}"

      - run: corepack enable
        shell: bash
      - name: Setup node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: ${{ matrix.node }}
          architecture: x64
      - name: Install dependencies
        run: corepack enable && pnpm install --frozen-lockfile
      - name: Download artifacts
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5.0.0
        with:
          name: bindings-${{ inputs.buildType }}-${{ inputs.package }}-${{ inputs.version}}-${{ matrix.settings.target }}
          path: ./packages/${{ inputs.package }}
      - name: List packages
        run: ls -R .
        shell: bash
      - name: Build TypeScript
        env:
          PACKAGE: ${{ inputs.package }}
        run: |
          cd "packages/$PACKAGE"
          pnpm build:ts
      - name: Test bindings
        env:
          PACKAGE: ${{ inputs.package }}
        run: |
          cd "packages/$PACKAGE"
          pnpm test
  test-linux-x64-gnu-binding:
    name: Test bindings on Linux-x64-gnu - node@${{ matrix.node }}
    needs:
      - build
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        node:
          - "20"
          - "22"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false
          ref: "v${{ inputs.version }}"

      - name: Corepack
        run: corepack enable
      - name: Setup node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: ${{ matrix.node }}
      - name: Install dependencies
        run: corepack enable && pnpm install --frozen-lockfile
      - name: Download artifacts
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5.0.0
        with:
          name: bindings-${{ inputs.buildType }}-${{ inputs.package }}-${{ inputs.version}}-x86_64-unknown-linux-gnu
          path: ./packages/${{ inputs.package }}
      - name: List packages
        run: ls -R .
        shell: bash
      - name: Build TypeScript
        env:
          PACKAGE: ${{ inputs.package }}
        run: |
          cd "packages/$PACKAGE"
          pnpm build:ts
      - name: Test bindings
        env:
          NODE_VERSION: ${{ matrix.node }}
          PACKAGE: ${{ inputs.package }}
        run: |
          set -euo pipefail
          case "$PACKAGE" in
            core | html | minifier | react-compiler) ;;
            *)
              echo "Unsupported package: $PACKAGE" >&2
              exit 1
              ;;
          esac

          case "$NODE_VERSION" in
            20) NODE_IMAGE="node:20-slim@sha256:2cf067cfed83d5ea958367df9f966191a942351a2df77d6f0193e162b5febfc0" ;;
            22) NODE_IMAGE="node:22-slim@sha256:689c11043dad91472750cd824c97dd5e2318e9dd6f954e492fe7af0135d33ceb" ;;
            *)
              echo "Unsupported Node.js version: $NODE_VERSION" >&2
              exit 1
              ;;
          esac

          PACKAGE_MANAGER="$(node -p "require('./package.json').packageManager")"
          case "$PACKAGE_MANAGER" in
            pnpm@*) ;;
            *)
              echo "Unsupported packageManager: $PACKAGE_MANAGER" >&2
              exit 1
              ;;
          esac

          docker run --rm \
            -e COREPACK_VERSION \
            -e PACKAGE \
            -e PACKAGE_MANAGER \
            -v "$PWD:/swc" \
            -w /swc \
            "$NODE_IMAGE" \
            sh -c 'npm install -g "corepack@${COREPACK_VERSION}" && corepack enable && corepack prepare "${PACKAGE_MANAGER}" --activate && env DISABLE_PLUGIN_E2E_TESTS=true pnpm "test:${PACKAGE}"'
  test-linux-x64-musl-binding:
    name: Test bindings on x86_64-unknown-linux-musl - node@${{ matrix.node }}
    needs:
      - build
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        node:
          - "20"
          - "22"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false
          ref: "v${{ inputs.version }}"

      - run: corepack enable
        shell: bash
      - name: Setup node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: ${{ matrix.node }}
      - name: Install dependencies
        run: |
          corepack enable
          pnpm install --frozen-lockfile --ignore-scripts --libc=musl
      - name: Download artifacts
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5.0.0
        with:
          name: bindings-${{ inputs.buildType }}-${{ inputs.package }}-${{ inputs.version}}-x86_64-unknown-linux-musl
          path: ./packages/${{ inputs.package }}
      - name: List packages
        run: ls -R .
        shell: bash
      - name: Build TypeScript
        env:
          PACKAGE: ${{ inputs.package }}
        run: |
          cd "packages/$PACKAGE"
          pnpm build:ts
      - name: Test bindings
        env:
          NODE_VERSION: ${{ matrix.node }}
          PACKAGE: ${{ inputs.package }}
        run: |
          set -euo pipefail
          case "$PACKAGE" in
            core | html | minifier | react-compiler) ;;
            *)
              echo "Unsupported package: $PACKAGE" >&2
              exit 1
              ;;
          esac

          case "$NODE_VERSION" in
            20) NODE_IMAGE="node:20-alpine@sha256:fb4cd12c85ee03686f6af5362a0b0d56d50c58a04632e6c0fb8363f609372293" ;;
            22) NODE_IMAGE="node:22-alpine@sha256:968df39aedcea65eeb078fb336ed7191baf48f972b4479711397108be0966920" ;;
            *)
              echo "Unsupported Node.js version: $NODE_VERSION" >&2
              exit 1
              ;;
          esac

          PACKAGE_MANAGER="$(node -p "require('./package.json').packageManager")"
          case "$PACKAGE_MANAGER" in
            pnpm@*) ;;
            *)
              echo "Unsupported packageManager: $PACKAGE_MANAGER" >&2
              exit 1
              ;;
          esac

          docker run --rm \
            -e COREPACK_VERSION \
            -e PACKAGE \
            -e PACKAGE_MANAGER \
            -v "$PWD:/swc" \
            -w /swc \
            "$NODE_IMAGE" \
            sh -c 'npm install -g "corepack@${COREPACK_VERSION}" && corepack enable && corepack prepare "${PACKAGE_MANAGER}" --activate && env DISABLE_PLUGIN_E2E_TESTS=true pnpm "test:${PACKAGE}"'
  publish:
    environment: publish
    name: Publish ${{ inputs.version }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    needs:
      - test-linux-x64-gnu-binding
      - test-linux-x64-musl-binding
      # - test-linux-arm-gnueabihf-binding
      - test-macOS-windows-binding
      # - test-linux-aarch64-musl-binding
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false
          ref: "v${{ inputs.version }}"

      - uses: ./.github/actions/setup-node
        with:
          cache: "false"

      # Update npm to latest, for trusted publish
      - name: Update npm to latest
        shell: bash
        run: |
          npm install -g npm@latest

      - name: Tag npm release
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          if [[ "$RELEASE_VERSION" != *"nightly"* ]]; then
            echo "NPM_TAG=latest" >> "$GITHUB_ENV"
          else
            echo "NPM_TAG=nightly" >> "$GITHUB_ENV"
          fi

      - name: Install dependencies
        run: corepack enable && pnpm install --frozen-lockfile

      - name: Download all artifacts
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5.0.0
        with:
          pattern: "bindings-${{ inputs.buildType }}-${{ inputs.package }}-${{ inputs.version}}-*"
          path: ./packages/${{ inputs.package }}/artifacts

      - name: List binaries
        shell: bash
        env:
          PACKAGE: ${{ inputs.package }}
        run: ls -R "packages/$PACKAGE/artifacts"

      - name: Move binaries
        shell: bash
        env:
          PACKAGE: ${{ inputs.package }}
        run: |
          cd "packages/$PACKAGE"
          ./scripts/cli_artifacts.sh
          ls -R ./artifacts
          ls -R ./artifacts_cli
          npm run artifacts

      - name: List npm
        shell: bash
        env:
          PACKAGE: ${{ inputs.package }}
        run: ls -R "packages/$PACKAGE/scripts/npm"

      - name: Set fallback dependencies
        shell: bash
        run: |
          node ./scripts/update_fallback_dependencies.js

      - name: Publish
        if: ${{ !inputs.skipPublishing }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PACKAGE: ${{ inputs.package }}
        run: |
          pnpm --filter "./packages/$PACKAGE" prepack
          pnpm publish -r --filter "./packages/$PACKAGE" --filter "./packages/$PACKAGE/scripts/npm/*" --access public --tag "$NPM_TAG" --force --no-git-checks

      - name: Upload CLI binaries to gh release
        if: ${{ !inputs.skipPublishing && inputs.package == 'core' }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: "v${{ inputs.version }}"
        run: |
          ./scripts/cli_upload_gh_release.sh

  publish-wasm:
    environment: publish
    name: Build - wasm (${{ matrix.settings.npm }})
    if: ${{ inputs.publishWasm }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    needs:
      - publish
    strategy:
      fail-fast: false
      matrix:
        settings:
          - package: "core"
            crate: "binding_core_wasm"
            npm: "@swc\\/wasm"
            target: nodejs
            out: "pkg"
          - package: "core"
            crate: "binding_core_wasm"
            npm: "@swc\\/wasm-web"
            target: web
            out: "pkg"
          - package: "core"
            crate: "binding_typescript_wasm"
            npm: "@swc\\/wasm-typescript"
            build: "./scripts/build.sh"
            out: "pkg"
          - package: "core"
            crate: "binding_typescript_wasm"
            npm: "@swc\\/wasm-typescript-esm"
            build: "./scripts/esm.sh"
            out: "esm"
          - package: "html"
            crate: "binding_html_wasm"
            npm: "@swc\\/html-wasm"
            target: nodejs
            out: "pkg"
          # - crate: "binding_es_ast_viewer"
          #   npm: "@swc\\/es-ast-viewer"
          #   build: "./scripts/build.sh"
          #   out: "pkg"

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false
          ref: "v${{ inputs.version }}"

      - name: Corepack
        run: corepack enable

      - name: Tag npm release
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          if [[ "$RELEASE_VERSION" != *"nightly"* ]]; then
            echo "NPM_TAG=latest" >> "$GITHUB_ENV"
          else
            echo "NPM_TAG=nightly" >> "$GITHUB_ENV"
          fi

      - name: Setup node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: 20

      - name: Install node dependencies
        run: pnpm install --frozen-lockfile

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build
        if: ${{ !matrix.settings.build }}
        env:
          CRATE: ${{ matrix.settings.crate }}
          NPM_PACKAGE: ${{ matrix.settings.npm }}
          WASM_TARGET: ${{ matrix.settings.target }}
        run: |
          cd "bindings/$CRATE"
          wasm-pack build --out-name wasm --release --scope=swc --target "$WASM_TARGET"
          sed -i -e "s/\"name\": \"@swc\\/${CRATE}\"/\"name\": \"${NPM_PACKAGE}\"/g" pkg/package.json

      - name: Build
        if: ${{ matrix.settings.build }}
        env:
          BUILD_SCRIPT: ${{ matrix.settings.build }}
          CRATE: ${{ matrix.settings.crate }}
        run: |
          cd "bindings/$CRATE"
          bash -lc "$BUILD_SCRIPT"

      - name: Update npm
        run: npm install -g npm@latest

      - name: Publish
        if: ${{ !inputs.skipBuild }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
          CRATE: ${{ matrix.settings.crate }}
          OUT_DIR: ${{ matrix.settings.out }}
        run: |
          cd "bindings/$CRATE/$OUT_DIR"
          npm publish --access public --tag "$NPM_TAG"
