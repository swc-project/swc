name: "Publish"
run-name: "Publish ${{ inputs.version }}"

env:
  CI: 1
  # 7 GiB by default on GitHub, setting to 6 GiB
  # https://docs.github.com/en/actions/using-github-hosted-runners/about-github-hosted-runners#supported-runners-and-hardware-resources
  NODE_OPTIONS: --max-old-space-size=6144
  GIT_AUTHOR_NAME: "SWC Bot"
  GIT_AUTHOR_EMAIL: "bot@swc.rs"
  GIT_COMMITTER_NAME: "SWC Bot"
  GIT_COMMITTER_EMAIL: "bot@swc.rs"

permissions: {}

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish"
        required: true
        type: string
      skipBuild:
        description: "Skip build. Used to debug swc-ecosystem-ci."
        required: false
        type: boolean
        default: false
      onlyNightly:
        description: "Publish only nightly"
        required: false
        type: boolean
        default: false
      allowBreakingWasm:
        description: "Allow breaking changes in wasm"
        required: false
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  determine-nightly-version:
    name: "Determine nightly version"
    runs-on: ubuntu-latest
    # Run only on main branch
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
    outputs:
      version: ${{ steps.determine-nightly-version.outputs.version }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-node
        with:
          cache: "false"
      - name: Determine nightly version
        id: determine-nightly-version
        env:
          RELEASE_VERSION: ${{ github.event.inputs.version }}
        run: |
          npx ts-node .github/bot/src/nightly-version.ts "$RELEASE_VERSION" >> "$GITHUB_OUTPUT"

  git-tag-nightly:
    name: "Git tag nightly"
    runs-on: ubuntu-latest
    needs:
      - determine-nightly-version
    environment: publish
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: ./.github/actions/tag-git-release
        if: inputs.skipBuild == false
        with:
          version: ${{ needs.determine-nightly-version.outputs.version }}
          ssh-private-key: ${{ secrets.SWC_BOT_SSH }}

  publish-npm-nightly:
    name: "Publish ${{ matrix.package }}@${{ needs.determine-nightly-version.outputs.version }}"
    strategy:
      fail-fast: false
      matrix:
        package:
          - core
          - html
          - minifier
          - react-compiler
    needs:
      - git-tag-nightly
      - determine-nightly-version
    permissions:
      contents: write
      id-token: write
    uses: ./.github/workflows/publish-npm-package.yml
    with:
      buildType: "nightly"
      package: ${{ matrix.package }}
      version: ${{ needs.determine-nightly-version.outputs.version }}
      buildCli: true
      skipBuild: ${{ inputs.skipBuild || false }}
      publishWasm: ${{ matrix.package == 'core' }}
      skipPublishing: ${{ github.event_name == 'pull_request' }}

  run-ecosystem-ci-with-nightly:
    name: "Test nightly using ecosystem CI"

    needs:
      - determine-nightly-version
      - publish-npm-nightly
    permissions:
      contents: read
    uses: ./.github/workflows/ecosystem-ci.yml
    with:
      version: ${{ needs.determine-nightly-version.outputs.version }}
      mode: "passing"
      suites: '["_"]'
      allowBreakingWasm: ${{ inputs.allowBreakingWasm || false }}

  git-tag-stable:
    name: "Git tag stable"
    runs-on: ubuntu-latest
    if: inputs.onlyNightly == false
    needs:
      - git-tag-nightly
      - run-ecosystem-ci-with-nightly
    environment: publish
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: ./.github/actions/tag-git-release
        if: inputs.skipBuild == false
        with:
          version: ${{ inputs.version }}
          ssh-private-key: ${{ secrets.SWC_BOT_SSH }}

  manage-milestone:
    name: "Manage milestone for ${{ inputs.version }}"
    runs-on: ubuntu-latest
    if: inputs.onlyNightly == false
    needs:
      - git-tag-stable
      - publish-npm-stable
    permissions:
      contents: read
      issues: write
      pull-requests: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: ./.github/actions/setup-node
        with:
          cache: "false"
      - name: Manage milestone
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}
          RELEASE_TAG: v${{ inputs.version }}
        run: |
          npx ts-node .github/bot/src/milestone-manager.ts "$RELEASE_TAG"

  publish-npm-stable:
    name: "Publish ${{ matrix.package }}@${{ inputs.version || 'stable' }} to npm"
    strategy:
      fail-fast: false
      matrix:
        package:
          - core
          - html
          - minifier
          - react-compiler
    needs:
      - run-ecosystem-ci-with-nightly
      - git-tag-stable

    permissions:
      contents: write
      id-token: write
    uses: ./.github/workflows/publish-npm-package.yml
    with:
      buildType: "stable"
      package: ${{ matrix.package }}
      version: ${{ inputs.version }}
      buildCli: true
      skipBuild: ${{ inputs.skipBuild || inputs.onlyNightly || false }}
      publishWasm: ${{ matrix.package == 'core' }}
      skipPublishing: ${{ github.event_name == 'pull_request' }}
