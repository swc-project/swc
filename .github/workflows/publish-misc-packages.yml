name: "Publish misc packages"
run-name: "Publish misc packages (${{ inputs.npmTag }})"

permissions: {}

on:
  workflow_dispatch:
    inputs:
      npmTag:
        description: "NPM dist-tag used for publishing"
        required: true
        type: choice
        default: latest
        options:
          - latest
          - nightly

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    name: "Publish ${{ matrix.package.name }}"
    runs-on: ubuntu-latest
    environment: publish
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        package:
          - name: "@swc/types"
            dir: "packages/types"
          - name: "@swc/helpers"
            dir: "packages/helpers"
    steps:
      - name: Ensure workflow runs from main
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" != "refs/heads/main" ]]; then
            echo "This workflow can only run from refs/heads/main. Current ref: ${GITHUB_REF}"
            exit 1
          fi

      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-node
        with:
          cache: "false"

      - name: Update npm to latest
        shell: bash
        run: npm install -g npm@latest

      - name: Log package version
        shell: bash
        env:
          NPM_TAG: ${{ inputs.npmTag }}
          PACKAGE_DIR: ${{ matrix.package.dir }}
          PACKAGE_NAME: ${{ matrix.package.name }}
        run: |
          cd "$PACKAGE_DIR"
          version="$(node -p "require('./package.json').version")"
          echo "Publishing ${PACKAGE_NAME}@${version} with npm tag '${NPM_TAG}'"

      - name: Publish
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
          NPM_TAG: ${{ inputs.npmTag }}
          PACKAGE_DIR: ${{ matrix.package.dir }}
        run: |
          cd "$PACKAGE_DIR"
          pnpm publish --access public --tag "$NPM_TAG" --force --no-git-checks
