[package]
description   = "SWC helpers for the React Compiler"
documentation = "https://rustdoc.swc.rs/swc_ecma_react_compiler/"
edition       = { workspace = true }
license       = { workspace = true }
name          = "swc_ecma_react_compiler"
repository    = { workspace = true }
version       = "20.0.2"


[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

[dependencies]
indexmap           = { workspace = true, features = ["serde"] }
react_compiler     = { version = "=0.2.0", package = "forked_react_compiler" }
react_compiler_ast = { version = "=0.2.0", package = "forked_react_compiler_ast" }
react_compiler_hir = { version = "=0.2.0", package = "forked_react_compiler_hir" }
rustc-hash         = { workspace = true }
serde              = { workspace = true, features = ["derive"] }
serde_json         = { workspace = true }
swc_atoms          = { version = "9.0.3", path = "../swc_atoms" }
swc_common         = { version = "23.0.2", path = "../swc_common" }
swc_ecma_ast       = { version = "25.0.0", path = "../swc_ecma_ast" }
swc_ecma_codegen   = { version = "28.0.2", path = "../swc_ecma_codegen" }
swc_ecma_parser    = { version = "41.1.2", path = "../swc_ecma_parser", default-features = false, features = [
  "typescript",
] }
swc_ecma_visit     = { version = "25.0.0", path = "../swc_ecma_visit" }

[dev-dependencies]
swc_common      = { version = "23.0.2", path = "../swc_common" }
swc_ecma_parser = { version = "41.1.2", path = "../swc_ecma_parser", default-features = false, features = [
  "typescript",
] }
testing         = { version = "24.0.1", path = "../testing" }
