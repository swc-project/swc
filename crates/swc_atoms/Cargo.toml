[package]
authors       = ["강동윤 <kdy1997.dev@gmail.com>"]
description   = "Atoms for the swc project."
documentation = "https://rustdoc.swc.rs/swc_atoms/"
edition       = { workspace = true }
license       = { workspace = true }
name          = "swc_atoms"
repository    = { workspace = true }
version       = "10.0.0"

[lib]
bench = false

[features]
encoding-impl = ["cbor4ii"]
shrink-to-fit = ["dep:shrink-to-fit"]

[dependencies]
arbitrary     = { workspace = true, optional = true }
cbor4ii       = { workspace = true, features = ["use_std"], optional = true }
once_cell     = { workspace = true }
serde         = { workspace = true }
shrink-to-fit = { workspace = true, optional = true }

hstr = { version = "4.0.0", path = "../hstr", features = ["serde"] }
