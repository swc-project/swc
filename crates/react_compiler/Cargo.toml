[package]
description = "Vendored React Compiler core from facebook/react#36173"
edition     = { workspace = true }
license     = { workspace = true }
name        = "react_compiler"
repository  = { workspace = true }
version     = "0.1.0"

[dependencies]
react_compiler_ast = { path = "../react_compiler_ast" }
react_compiler_diagnostics = { path = "../react_compiler_diagnostics" }
react_compiler_hir = { path = "../react_compiler_hir" }
react_compiler_inference = { path = "../react_compiler_inference" }
react_compiler_lowering = { path = "../react_compiler_lowering" }
react_compiler_optimization = { path = "../react_compiler_optimization" }
react_compiler_reactive_scopes = { path = "../react_compiler_reactive_scopes" }
react_compiler_ssa = { path = "../react_compiler_ssa" }
react_compiler_typeinference = { path = "../react_compiler_typeinference" }
react_compiler_validation = { path = "../react_compiler_validation" }
indexmap = { workspace = true }
regex = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true, features = ["raw_value"] }
